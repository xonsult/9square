const AudioEngine = {
  ctx: null,
  enabled: true,
  volume: 0.8,
  music: null,
  musicPlaying: false,
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === "suspended") this.ctx.resume();
  },
  initMusic() {
    if (!this.music) {
      this.music = new Audio("9squaretheme.mp3");
      this.music.loop = true;
    }
  },
  startMusic() {
    this.initMusic();
    if (!this.musicPlaying) {
      this.music.play().catch(()=>{});
      this.musicPlaying = true;
    }
  },
  stopMusic() {
    if (this.music && this.musicPlaying) {
      this.music.pause();
      this.music.currentTime = 0;
      this.musicPlaying = false;
    }
  },
  playTone(step, type) {
    if (!this.enabled) return;
    this.init();
    const ctx = this.ctx;
    const v = this.volume;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === "correct") {
      const freqs = [261.6,293.7,329.6,349.2,392.0,440.0,493.9,523.3,587.3];
      osc.frequency.value = freqs[step]||523.3; osc.type = "sine";
      gain.gain.setValueAtTime(0.15*v,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.25);
      osc.start(); osc.stop(ctx.currentTime+0.25);
    } else if (type === "wrong") {
      osc.frequency.setValueAtTime(320,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(180,ctx.currentTime+0.15);
      osc.type = "sine";
      gain.gain.setValueAtTime(0.1*v,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.25);
      osc.start(); osc.stop(ctx.currentTime+0.25);
    } else if (type === "clear") {
      [523.3,659.3,784.0].forEach((f,i) => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f; o.type = "sine";
        g.gain.setValueAtTime(0.12*v,ctx.currentTime+i*0.08);
        g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+i*0.08+0.3);
        o.start(ctx.currentTime+i*0.08); o.stop(ctx.currentTime+i*0.08+0.3);
      });
    } else if (type === "countdown") {
      osc.frequency.value = 660; osc.type = "sine";
      gain.gain.setValueAtTime(0.08*v,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);
      osc.start(); osc.stop(ctx.currentTime+0.15);
    }
  }
};

function shuffleArray(seed) {
  const arr = [1,2,3,4,5,6,7,8,9];
  if (seed !== undefined) {
    let s = seed;
    const rng = () => { s = (s*16807+0)%2147483647; return (s-1)/2147483646; };
    for (let i=arr.length-1;i>0;i--) { const j=Math.floor(rng()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  } else {
    for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  }
  return arr;
}

// localStorage persistence
function saveGame(data) { try { localStorage.setItem("9sq", JSON.stringify(data)); } catch(e){} }
function loadGame() { try { const d=localStorage.getItem("9sq"); return d?JSON.parse(d):null; } catch(e){ return null; } }
function getTodayStr() { const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }

function NineSquare() {
  // Load saved data
  const saved = useRef(loadGame());
  const today = getTodayStr();
  const isNewDay = !saved.current || saved.current.lastDate !== today;

  const [mode, setMode] = useState(null);
  const [gameState, setGameState] = useState(GS.SPLASH);
  const [splashOpacity, setSplashOpacity] = useState(0);
  const [splashPhase, setSplashPhase] = useState(0);
  const [splashReady, setSplashReady] = useState(false);
  const [showTutorial, setShowTutorial] = useState(false);
  const [tutorialPage, setTutorialPage] = useState(0);
  const tutorialTouchStart = useRef(null);
  const [showBadgeOverlay, setShowBadgeOverlay] = useState(false);
  const [newBadgeIds, setNewBadgeIds] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [soundEnabled, setSoundEnabled] = useState(saved.current?.soundEnabled !== false);
  const [soundVolume, setSoundVolume] = useState(saved.current?.soundVolume ?? 0.8);
  const [musicEnabled, setMusicEnabled] = useState(saved.current?.musicEnabled || false);
  const [musicVolume, setMusicVolume] = useState(saved.current?.musicVolume ?? 0.3);
  const [hapticEnabled, setHapticEnabled] = useState(saved.current?.hapticEnabled !== false);
  const [themeName, setThemeName] = useState(saved.current?.theme || "green");
  const [grid, setGrid] = useState(() => shuffleArray());
  const [nextTarget, setNextTarget] = useState(1);
  const [cellStates, setCellStates] = useState(Array(9).fill("neutral"));
  const [round, setRound] = useState(1);
  const [timer, setTimer] = useState(0);
  const [wrongFlash, setWrongFlash] = useState(false);
  const [streakGlow, setStreakGlow] = useState(0);
  const [lastClearTime, setLastClearTime] = useState(0);
  const [showModeSelect, setShowModeSelect] = useState(false);
  const [countdownPhase, setCountdownPhase] = useState(0);
  const [bgRotation, setBgRotation] = useState(0);
  const [bgPulse, setBgPulse] = useState(0);
  const [classicSolves, setClassicSolves] = useState(isNewDay ? 0 : (saved.current?.classicSolvesToday||0));
  const [classicBestTime, setClassicBestTime] = useState(saved.current?.classicBestTime||Infinity);
  const [classicTotalTime, setClassicTotalTime] = useState(saved.current?.classicTotalTime||0);
  const [classicTotalSolves, setClassicTotalSolves] = useState(saved.current?.classicTotalSolves||0);
  const [todayBadges, setTodayBadges] = useState(isNewDay ? {solver:false,quick:false,builder:false,speedy:false,bragger:false} : (saved.current?.todayBadges||{solver:false,quick:false,builder:false,speedy:false,bragger:false}));
  const [dailyStreak, setDailyStreak] = useState(() => {
    if (!saved.current) return 0;
    const s = saved.current;
    // If yesterday had all 5 badges, streak continues. If new day, check if yesterday completed.
    if (isNewDay && s.allBadgesYesterday) return (s.dailyStreak||0) + 1;
    if (isNewDay && !s.allBadgesYesterday) return 0;
    return s.dailyStreak||0;
  });
  const [showBadges, setShowBadges] = useState(false);
  const [showShareCard, setShowShareCard] = useState(false);
  const [enduranceBest, setEnduranceBest] = useState(saved.current?.enduranceBest||{round:0,clearTime:Infinity});
  const [dailyTime, setDailyTime] = useState((!isNewDay && saved.current?.dailyTime) ? saved.current.dailyTime : null);

  const builderFloorRef = useRef(0);
  const builderActiveRef = useRef(true);
  const timerRef = useRef(0);
  const intervalRef = useRef(null);
  const gsRef = useRef(GS.MENU);
  const nextTargetRef = useRef(1);
  const cellStatesRef = useRef(Array(9).fill("neutral"));
  const roundRef = useRef(1);
  const roundStartRef = useRef(0);
  const modeRef = useRef(null);
  const gridRef = useRef(grid);
  const classicSolvesRef = useRef(isNewDay ? 0 : (saved.current?.classicSolvesToday||0));
  const classicTotalSolvesRef = useRef(saved.current?.classicTotalSolves||0);
  const classicTotalTimeRef = useRef(saved.current?.classicTotalTime||0);
  const classicBestTimeRef = useRef(saved.current?.classicBestTime||Infinity);
  const todayBadgesRef = useRef(todayBadges);
  const touchHandled = useRef(false);

  // Save to localStorage whenever key state changes
  const persistState = useCallback(() => {
    const allBadges = Object.values(todayBadgesRef.current).every(Boolean);
    saveGame({
      classicBestTime: classicBestTimeRef.current,
      classicTotalTime: classicTotalTimeRef.current,
      classicTotalSolves: classicTotalSolvesRef.current,
      classicSolvesToday: classicSolvesRef.current,
      enduranceBest: enduranceBest,
      todayBadges: todayBadgesRef.current,
      dailyStreak: dailyStreak,
      dailyTime: dailyTime,
      lastDate: getTodayStr(),
      allBadgesYesterday: allBadges,
      soundEnabled: soundEnabled,
      soundVolume: soundVolume,
      musicEnabled: musicEnabled,
      musicVolume: musicVolume,
      hapticEnabled: hapticEnabled,
      theme: themeName,
    });
  }, [enduranceBest, dailyStreak, dailyTime, soundEnabled, soundVolume, musicEnabled, musicVolume, hapticEnabled, themeName]);

  useEffect(() => { gsRef.current = gameState; }, [gameState]);
  useEffect(() => { modeRef.current = mode; }, [mode]);
  useEffect(() => { gridRef.current = grid; }, [grid]);
  useEffect(() => { todayBadgesRef.current = todayBadges; }, [todayBadges]);
  useEffect(() => { AudioEngine.enabled = soundEnabled; AudioEngine.volume = soundVolume; }, [soundEnabled, soundVolume]);
  useEffect(() => {
    const isGameplay = [GS.PLAYING,GS.COUNTDOWN,GS.ROUND_CLEAR,GS.READY].includes(gameState);
    const isActive = [GS.PLAYING,GS.COUNTDOWN].includes(gameState);
    if (musicEnabled && isGameplay) {
      AudioEngine.startMusic();
      // Duck volume during active play, full volume during ready/round clear
      if (AudioEngine.music) AudioEngine.music.volume = isActive ? musicVolume * 0.5 : musicVolume;
    } else {
      AudioEngine.stopMusic();
    }
  }, [musicEnabled, gameState, musicVolume]);
  const haptic = () => { if (hapticEnabled && navigator.vibrate) navigator.vibrate(8); };

  // Splash screen — triangles, presents cycles twice, elegant fade out
  useEffect(() => {
    if (gameState !== GS.SPLASH) return;
    setTimeout(() => setSplashOpacity(1), 50);
    
    const proceed = () => {
      setSplashPhase(1);
      // "presents..." appears at ~3.8s via CSS, two ellipsis cycles = ~6.3s
      // Start fade out right after
      setTimeout(() => { setSplashPhase(2); setSplashOpacity(0); }, 10000);
      setTimeout(() => setGameState(GS.MENU), 10800);
    };

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => setTimeout(proceed, 800));
    } else {
      setTimeout(proceed, 2000);
    }
    const fallback = setTimeout(() => { if (gsRef.current === GS.SPLASH) { setSplashOpacity(0); setTimeout(() => setGameState(GS.MENU), 500); } }, 16000);
    return () => clearTimeout(fallback);
  }, []);

  useEffect(() => {
    let frame, t = 0;
    const animate = () => { t+=0.002; setBgRotation(t*18); setBgPulse(Math.sin(t*1.5)*0.5+0.5); frame=requestAnimationFrame(animate); };
    frame = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(frame);
  }, []);

  const startTimerUp = useCallback(() => {
    if (intervalRef.current) clearInterval(intervalRef.current);
    timerRef.current=0; setTimer(0);
    intervalRef.current = setInterval(() => {
      if (gsRef.current!==GS.PLAYING) return;

  const getEnduranceTime = (r) => Math.max(1, 61-r);

  const startCountdown = useCallback((roundNum, forcedGrid) => {

      setCellStates(s); cellStatesRef.current=s; }, 2000);

      setCountdownPhase(0); roundStartRef.current=Date.now();
      if (modeRef.current===MODES.ENDURANCE) startTimerDown(getEnduranceTime(roundNum)); else startTimerUp();
      setGameState(GS.PLAYING);

  const startCountdownRef = useRef(startCountdown);

  const pendingGridRef = useRef(null);

  const startGame = (selectedMode) => {

          if (clearSec<=ntt/nt) nb.speedy=true;
          const newlyEarned=BADGE_DEFS.filter(b=>nb[b.id]&&!oldBadges[b.id]).map(b=>b.id);
          todayBadgesRef.current=nb; setTodayBadges(nb);
          if (Object.values(nb).every(Boolean)) setDailyStreak(prev=>prev<1?1:prev);
          setGameState(GS.ROUND_CLEAR);

            setNewBadgeIds(newlyEarned);
            setTimeout(()=>setShowBadgeOverlay(true),1300);
          } else {
            setTimeout(()=>prepareRound(1),1200);
          }
          setTimeout(()=>persistState(),100);
        } else if (currentMode===MODES.DAILY) { setDailyTime(clearSec); setGameState(GS.DAILY_DONE); setTimeout(()=>persistState(),100); }
        else if (currentMode===MODES.ENDURANCE) {
          const r=roundRef.current;

        soundEnabled&&e("input",{type:"range",min:"0",max:"100",value:Math.round(soundVolume*100),
          onClick:(ev)=>ev.stopPropagation(),
          onChange:(ev)=>{setSoundVolume(ev.target.value/100);setTimeout(()=>persistState(),50);},
          style:{width:"100%",marginTop:"10px",accentColor:TH.primary,cursor:"pointer"}})
      ),

      // Background Music - toggle + volume slider
      e("div",{style:{width:"min(80vw,280px)",padding:"14px 18px",background:TH.surface,borderRadius:"8px",
        border:"1px solid rgba("+TH.borderGlow+",0.1)"}},
        e("div",{onClick:()=>{setMusicEnabled(p=>!p);setTimeout(()=>persistState(),50);},
          style:{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}},
          e("div",{style:{fontSize:"18px",fontFamily:F_BODY,fontWeight:600,color:TH.text}},"Background Music"),
          e("div",{style:{width:"48px",height:"26px",borderRadius:"13px",position:"relative",
            background:musicEnabled?TH.primary:"rgba(255,255,255,0.1)",transition:"background 0.3s"}},
            e("div",{style:{width:"22px",height:"22px",borderRadius:"50%",background:"#fff",position:"absolute",
              top:"2px",left:musicEnabled?"24px":"2px",transition:"left 0.3s",
              boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}))
        ),
        musicEnabled&&e("input",{type:"range",min:"0",max:"100",value:Math.round(musicVolume*100),
          onClick:(ev)=>ev.stopPropagation(),
          onChange:(ev)=>{setMusicVolume(ev.target.value/100);
            if(AudioEngine.music)AudioEngine.music.volume=ev.target.value/100*(
              [GS.PLAYING,GS.COUNTDOWN].includes(gsRef.current)?0.5:1);
            setTimeout(()=>persistState(),50);},
          style:{width:"100%",marginTop:"10px",accentColor:TH.primary,cursor:"pointer"}})
      ),

      // Haptic Feedback - toggle only
      e("div",{onClick:()=>{setHapticEnabled(p=>!p);setTimeout(()=>persistState(),50);},
        style:{display:"flex",alignItems:"center",justifyContent:"space-between",width:"min(80vw,280px)",
          padding:"14px 18px",background:TH.surface,borderRadius:"8px",cursor:"pointer",
          border:"1px solid rgba("+TH.borderGlow+",0.1)"}},
        e("div",{style:{fontSize:"18px",fontFamily:F_BODY,fontWeight:600,color:TH.text}},"Haptic Feedback"),
        e("div",{style:{width:"48px",height:"26px",borderRadius:"13px",position:"relative",
          background:hapticEnabled?TH.primary:"rgba(255,255,255,0.1)",transition:"background 0.3s"}},
          e("div",{style:{width:"22px",height:"22px",borderRadius:"50%",background:"#fff",position:"absolute",
            top:"2px",left:hapticEnabled?"24px":"2px",transition:"left 0.3s",
            boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}))
      ),

      e("div",{style:{marginTop:"12px",fontSize:"14px",fontFamily:F_BODY,fontWeight:600,color:TH.textDim,letterSpacing:"3px",textAlign:"center"}},"THEME"),
      e("div",{style:{display:"flex",gap:"14px",marginTop:"8px"}},
        Object.keys(THEMES).map(k=>e("div",{key:k,
          onClick:()=>{setThemeName(k);setTimeout(()=>persistState(),50);},
          style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",cursor:"pointer"}},
          e("div",{style:{width:"40px",height:"40px",borderRadius:"50%",overflow:"hidden",
            background:k==="rainbow"?"conic-gradient(#e06060,#e0c040,#40c080,#6080e0,#a060d0,#e06060)":THEMES[k].primary,
            outline:k===themeName?"3px solid #fff":"3px solid transparent",outlineOffset:"2px",
            boxShadow:k===themeName?"0 0 14px "+(k==="rainbow"?"rgba(100,200,255,0.5)":THEMES[k].primary):"none",
            transition:"all 0.2s"}}),
          e("div",{style:{fontSize:"9px",fontFamily:F_BODY,color:k===themeName?TH.text:TH.textDim,
            letterSpacing:"1px"}},THEMES[k].name)
        ))
      ),

      e("button",{onClick:()=>setShowSettings(false),style:{marginTop:"20px",padding:"12px 36px",fontSize:"20px",
        fontFamily:F_DISPLAY,background:"rgba(255,255,255,0.04)",color:TH.textDim,
        border:"1px solid rgba(255,255,255,0.08)",borderRadius:"6px",cursor:"pointer",letterSpacing:"2px"}},"CLOSE"),

      // Support + Contact
      e("div",{style:{marginTop:"24px",display:"flex",gap:"10px",alignItems:"center",justifyContent:"center"}},
        e("span",{style:{fontSize:"13px",fontFamily:F_BODY,fontWeight:600,color:TH.textDimmer}},"Support:"),
        e("a",{href:VENMO_URL,target:"_blank",rel:"noopener",
          style:{padding:"4px 12px",fontSize:"13px",fontFamily:F_DISPLAY,
            background:"rgba("+TH.borderGlow+",0.1)",border:"1px solid rgba("+TH.borderGlow+",0.18)",
            borderRadius:"4px",color:TH.primary,cursor:"pointer",textDecoration:"none",letterSpacing:"1px"}},"Venmo"),
        e("a",{href:PAYPAL_URL,target:"_blank",rel:"noopener",
          style:{padding:"4px 12px",fontSize:"13px",fontFamily:F_DISPLAY,
            background:"rgba("+TH.borderGlow+",0.1)",border:"1px solid rgba("+TH.borderGlow+",0.18)",
            borderRadius:"4px",color:TH.primary,cursor:"pointer",textDecoration:"none",letterSpacing:"1px"}},"PayPal"),
        e("a",{href:"mailto:xonsult+9square@gmail.com?subject=9square%20feedback",
          style:{padding:"4px 12px",fontSize:"13px",fontFamily:F_DISPLAY,
            background:"rgba("+TH.borderGlow+",0.1)",border:"1px solid rgba("+TH.borderGlow+",0.18)",
            borderRadius:"4px",color:TH.primary,cursor:"pointer",textDecoration:"none",letterSpacing:"1px"}},"Contact")
      ),
      e("div",{style:{marginTop:"12px",fontSize:"12px",fontFamily:F_BODY,color:TH.textDimmer,letterSpacing:"1px"}},"v1.5")
    )
  );
}


ReactDOM.render(e(NineSquare), document.getElementById("root"));
</script>
</body>
</html>
